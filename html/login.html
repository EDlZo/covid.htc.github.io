<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ — Covid HTC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0D0D0F;
      --card:    rgba(22,22,26,0.85);
      --border:  rgba(255,255,255,0.08);
      --accent:  #00C96E;
      --accent2: #00A859;
      --text:    #F0F0F5;
      --muted:   #8A8A9A;
      --danger:  #E85D5D;
      --radius:  16px;
    }

    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 600px 500px at 20% 30%, rgba(0,201,110,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 500px 400px at 80% 70%, rgba(0,168,89,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .brand-text h1 {
      font-size: 18px; font-weight: 700;
      color: var(--text); line-height: 1.2;
    }

    .brand-text p {
      font-size: 13px; color: var(--muted); font-weight: 400;
    }

    h2 {
      font-size: 26px; font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px; color: var(--muted);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 16px;
      pointer-events: none;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px 14px 46px;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 15px; color: var(--text);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      background: rgba(0,201,110,0.06);
      box-shadow: 0 0 0 3px rgba(0,201,110,0.15);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 16px; font-weight: 700;
      color: #fff; cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(0,201,110,0.35);
      position: relative; overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,201,110,0.45);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login .btn-loader {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading span { display: none; }
    .btn-login.loading .btn-loader { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(232,93,93,0.12);
      border: 1px solid rgba(232,93,93,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 14px; color: var(--danger);
    }

    .error-msg.show { display: flex; }

    .back-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px; color: var(--muted);
    }

    .back-link a {
      color: var(--accent); text-decoration: none; font-weight: 600;
    }

    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">🦠</div>
        <div class="brand-text">
          <h1>Covid HTC</h1>
          <p>วิทยาลัยเทคนิคหาดใหญ่</p>
        </div>
      </div>

      <h2>เข้าสู่ระบบ</h2>
      <p class="subtitle">สำหรับเจ้าหน้าที่ผู้ดูแลระบบเท่านั้น</p>

      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label>รหัสผ่าน</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" />
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="submitLogin()">
        <span>เข้าสู่ระบบ</span>
        <div class="btn-loader"></div>
      </button>

      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorText">เกิดข้อผิดพลาด</span>
      </div>

      <div class="back-link">
        <a href="./index.php">← กลับหน้าหลัก</a>
      </div>
    </div>
  </div>

  <script>
    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitLogin();
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('show');
    }

    function submitLogin() {
      const btn = document.getElementById('loginBtn');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      hideError();

      if (!username || !password) {
        showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      const formData = new FormData();
      formData.append('username', username);
      formData.append('password', password);

      fetch('/Covid19/covid.htc.github.io/CovidAPI/Login.php', {
        method: 'POST',
        body: formData
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          window.location.href = './Edit/admin_list.php';
        } else {
          showError(resp.message || 'เข้าสู่ระบบไม่สำเร็จ');
        }
      })
      .catch(() => showError('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้'))
      .finally(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
